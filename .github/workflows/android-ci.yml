name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (matches your Gradle/JVM setup)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Force clean Gradle state (fixes your crash)
      - name: Remove Gradle cache
        run: rm -rf .gradle

      # 4. Make Gradle wrapper executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Clean build (fresh state)
      - name: Clean project
        run: ./gradlew clean

      # 6. Run unit tests
      - name: Run tests
        run: ./gradlew test

      # 7. Build debug APK
      - name: Build APK
        run: ./gradlew assembleDebug
